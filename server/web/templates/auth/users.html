{{define "title"}}사용자 관리 · 고객지원시스템{{end}}
{{define "content"}}
<div class="space-y-6" x-data="{ showForm: false }">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-bold text-gray-800">사용자 / 권한 관리</h2>
    <button @click="showForm=!showForm" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">+ 사용자 추가</button>
  </div>

  <div x-show="showForm" x-cloak class="bg-white rounded-xl border border-gray-200 p-6">
    <form method="POST" action="/users" class="grid grid-cols-1 sm:grid-cols-5 gap-3 items-end">
      <div><label class="block text-xs font-medium text-gray-600 mb-1">아이디</label><input type="text" name="username" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-xs font-medium text-gray-600 mb-1">비밀번호</label><input type="password" name="password" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-xs font-medium text-gray-600 mb-1">이름</label><input type="text" name="full_name" required class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-xs font-medium text-gray-600 mb-1">역할</label>
        <select name="role" class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="admin">관리자</option><option value="receipt">접수담당</option>
          <option value="tech">기술담당</option><option value="sales">영업담당</option>
          <option value="viewer" selected>열람사용자</option>
        </select>
      </div>
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2 text-sm font-medium">등록</button>
    </form>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b"><tr>
        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500">아이디</th>
        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500">이름</th>
        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500">역할</th>
        <th class="text-center px-4 py-3 text-xs font-semibold text-gray-500">상태</th>
        <th class="text-center px-4 py-3 text-xs font-semibold text-gray-500">작업</th>
      </tr></thead>
      <tbody class="divide-y divide-gray-100">
        {{range .Users}}
        <tr>
          <td class="px-4 py-2.5 font-mono text-xs">{{.Username}}</td>
          <td class="px-4 py-2.5 font-medium">{{.FullName}}</td>
          <td class="px-4 py-2.5">{{.Role}}</td>
          <td class="px-4 py-2.5 text-center">{{if .IsActive}}<span class="text-green-600">활성</span>{{else}}<span class="text-gray-400">비활성</span>{{end}}</td>
          <td class="px-4 py-2.5 text-center">
            <form method="POST" action="/users/{{.UserID}}/update" class="inline-flex gap-1 items-center">
              <select name="role" class="border rounded px-1 py-0.5 text-xs">
                <option value="admin" {{if eq .Role "admin"}}selected{{end}}>관리자</option>
                <option value="receipt" {{if eq .Role "receipt"}}selected{{end}}>접수</option>
                <option value="tech" {{if eq .Role "tech"}}selected{{end}}>기술</option>
                <option value="sales" {{if eq .Role "sales"}}selected{{end}}>영업</option>
                <option value="viewer" {{if eq .Role "viewer"}}selected{{end}}>열람</option>
              </select>
              <input type="hidden" name="full_name" value="{{.FullName}}">
              <input type="hidden" name="is_active" value="{{if .IsActive}}1{{else}}0{{end}}">
              <button type="submit" class="text-blue-600 hover:underline text-xs">저장</button>
            </form>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
{{end}}
