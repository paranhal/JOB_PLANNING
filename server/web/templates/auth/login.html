{{define "title"}}로그인 · 고객지원시스템{{end}}
{{define "content"}}
<div class="w-full max-w-sm mx-auto">
  <div class="text-center mb-8">
    <div class="w-14 h-14 bg-blue-500 rounded-xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">고객지원시스템</h1>
    <p class="text-sm text-gray-500 mt-1">CS Management System</p>
  </div>

  {{if .Error}}<div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-4">{{.Error}}</div>{{end}}

  <form method="POST" action="/login" class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
      <input type="text" name="username" required autofocus
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
      <input type="password" name="password" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2.5 text-sm font-medium transition-colors">
      로그인
    </button>
    <p class="text-xs text-gray-400 text-center">초기 계정: admin / admin</p>
  </form>
</div>
{{end}}
