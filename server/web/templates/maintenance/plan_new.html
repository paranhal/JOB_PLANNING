{{define "title"}}연도 계획 등록 · 고객지원시스템{{end}}

{{define "content"}}
<div class="max-w-lg space-y-4">
  <h2 class="text-xl font-bold text-gray-800">연도 계획 등록</h2>
  <p class="text-sm text-gray-500">연도당 하나의 계획만 둘 수 있습니다. 먼저 「점검 사이트 설정」을 권장합니다.</p>

  <form method="POST" action="/maintenance" class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">연도</label>
      <input type="number" name="plan_year" value="{{.Year}}" required min="2000" max="2100"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">제목 (선택)</label>
      <input type="text" name="title" placeholder="예: 2026년 정기점검"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
    </div>
    <div class="flex gap-2 pt-2">
      <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium">저장</button>
      <a href="/maintenance" class="px-4 py-2 border border-gray-300 rounded-lg text-sm">취소</a>
    </div>
  </form>
</div>
{{end}}
