{{define "title"}}코드 관리 · 고객지원시스템{{end}}

{{define "content"}}
<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-bold text-gray-800">코드 관리</h2>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">코드그룹</th>
          <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">코드값</th>
          <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">코드명</th>
          <th class="text-center px-4 py-3 text-xs font-semibold text-gray-500 uppercase">순서</th>
          <th class="text-center px-4 py-3 text-xs font-semibold text-gray-500 uppercase">활성</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        {{range .Codes}}
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-2.5 text-gray-500 font-mono text-xs">{{.CodeGroup}}</td>
          <td class="px-4 py-2.5 font-mono text-xs">{{.CodeValue}}</td>
          <td class="px-4 py-2.5 font-medium text-gray-800">{{.CodeName}}</td>
          <td class="px-4 py-2.5 text-center text-gray-500">{{.SortOrder}}</td>
          <td class="px-4 py-2.5 text-center">
            {{if .IsActive}}
              <span class="text-green-600">●</span>
            {{else}}
              <span class="text-gray-300">●</span>
            {{end}}
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
{{end}}
