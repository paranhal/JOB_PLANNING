{{define "title"}}AS 접수 · 고객지원시스템{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-3">
    <a href="/as" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a>
    <div><h2 class="text-xl font-bold text-gray-800">AS 접수</h2><p class="text-sm text-gray-500">기획서 §8 기준</p></div>
  </div>

  <form id="as-form" method="POST" action="/as" class="space-y-6"
        data-init-asset="{{.AS.AssetID}}"
        data-init-requester="{{.AS.Requester}}">
    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h3 class="font-semibold text-gray-700 text-sm uppercase tracking-wider">접수 대상</h3>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">기관 <span class="text-red-500">*</span></label>
        <select name="customer_id" id="as-customer_id" required class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="">기관 선택</option>
          {{range .Customers}}<option value="{{.CustomerID}}" {{if eq $.AS.CustomerID .CustomerID}}selected{{end}}>{{.OrgName}}</option>{{end}}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">설치자산 (선택)</label>
        <select name="asset_id" id="as-asset_id" class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="">자산 미연결 (나중에 매핑)</option>
          {{range .Assets}}
          <option value="{{.AssetID}}" {{if eq $.AS.AssetID .AssetID}}selected{{end}}>
            {{.ProductName}}{{if .ModelName}} / {{.ModelName}}{{end}}{{if .SerialNumber}} ({{.SerialNumber}}){{end}}
          </option>
          {{end}}
        </select>
        <p class="mt-1 text-xs text-gray-400">기관을 선택하면 해당 기관의 설치자산 목록이 표시됩니다.</p>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h3 class="font-semibold text-gray-700 text-sm uppercase tracking-wider">접수 정보</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">접수 채널</label>
          <select name="receipt_channel" class="w-full border rounded-lg px-3 py-2 text-sm">
            {{range .Channels}}<option value="{{.CodeValue}}">{{.CodeName}}</option>{{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">긴급도</label>
          <select name="urgency" class="w-full border rounded-lg px-3 py-2 text-sm">
            {{range .Urgencies}}<option value="{{.CodeValue}}" {{if eq .CodeValue "normal"}}selected{{end}}>{{.CodeName}}</option>{{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">중요도</label>
          <select name="priority" class="w-full border rounded-lg px-3 py-2 text-sm">
            <option value="high">상</option><option value="normal" selected>중</option><option value="low">하</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">요청자</label>
          <select name="requester_code" id="as-requester_code" class="w-full border rounded-lg px-3 py-2 text-sm">
            <option value="">선택</option>
            {{range .Contacts}}
            <option value="{{.FullName}}" {{if eq $.AS.Requester .FullName}}selected{{end}}>
              {{.FullName}}{{if .Title}} · {{.Title}}{{end}}{{if .IsPrimary}} (주담당){{end}}{{if ne .Status "active"}} [{{.Status}}]{{end}}
            </option>
            {{end}}
            <option value="custom">직접입력</option>
          </select>
          <div id="as-requester-custom-wrap" class="mt-2 hidden">
            <input type="text" name="requester_custom" id="as-requester_custom"
                   placeholder="요청자 이름 직접 입력"
                   class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <p class="mt-1 text-xs text-gray-400">기관 담당자 목록에서 선택하거나 직접입력하세요.</p>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">증상 내용 <span class="text-red-500">*</span></label>
        <textarea name="symptom" rows="4" required placeholder="장애 또는 지원 요청 내용을 자세히 입력하세요." class="w-full border rounded-lg px-3 py-2 text-sm">{{.AS.Symptom}}</textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">요청주체 유형</label>
          <select name="requester_type" class="w-full border rounded-lg px-3 py-2 text-sm">
            {{range .ReqTypes}}<option value="{{.CodeValue}}">{{.CodeName}}</option>{{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">요청주체명</label>
          <input type="text" name="requester_name" value="{{.AS.RequesterName}}" placeholder="요청 주체 회사/기관명" class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">배정 담당자</label>
          <input type="text" name="assigned_to" value="{{.AS.AssignedTo}}" placeholder="담당자 이름" class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
      </div>
    </div>

    <div class="flex gap-3 justify-end">
      <a href="/as" class="px-5 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">취소</a>
      <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">접수 등록</button>
    </div>
  </form>

  <script>
  (function () {
    var form = document.getElementById('as-form');
    if (!form) return;
    var custSel = document.getElementById('as-customer_id');
    var assetSel = document.getElementById('as-asset_id');
    var reqSel = document.getElementById('as-requester_code');
    var reqCustomWrap = document.getElementById('as-requester-custom-wrap');
    var reqCustom = document.getElementById('as-requester_custom');
    var initAsset = form.getAttribute('data-init-asset') || '';
    var initRequester = form.getAttribute('data-init-requester') || '';

    function assetLabel(a) {
      var t = a.product_name || a.ProductName || '';
      var model = a.model_name || a.ModelName || '';
      var sn = a.serial_number || a.SerialNumber || '';
      if (model) t += ' / ' + model;
      if (sn) t += ' (' + sn + ')';
      return t || (a.asset_id || a.AssetID);
    }

    function contactLabel(ct) {
      var name = ct.full_name || ct.FullName || '';
      var title = ct.title || ct.Title || '';
      var primary = ct.is_primary || ct.IsPrimary;
      var status = ct.status || ct.Status || 'active';
      var t = name;
      if (title) t += ' · ' + title;
      if (primary) t += ' (주담당)';
      if (status && status !== 'active') t += ' [' + status + ']';
      return t || name;
    }

    function syncRequesterCustom() {
      if (reqSel.value === 'custom') {
        reqCustomWrap.classList.remove('hidden');
      } else {
        reqCustomWrap.classList.add('hidden');
        reqCustom.value = '';
      }
    }

    function resetAssets(keepPlaceholder) {
      assetSel.innerHTML = '';
      var opt0 = document.createElement('option');
      opt0.value = '';
      opt0.textContent = keepPlaceholder ? '자산 미연결 (나중에 매핑)' : '기관을 먼저 선택하세요';
      assetSel.appendChild(opt0);
    }

    function resetRequesters(keepPlaceholder) {
      reqSel.innerHTML = '';
      var opt0 = document.createElement('option');
      opt0.value = '';
      opt0.textContent = keepPlaceholder ? '선택' : '기관을 먼저 선택하세요';
      reqSel.appendChild(opt0);
      var optCustom = document.createElement('option');
      optCustom.value = 'custom';
      optCustom.textContent = '직접입력';
      reqSel.appendChild(optCustom);
      syncRequesterCustom();
    }

    function loadAssets(cid, selectedId) {
      resetAssets(!!cid);
      if (!cid) return Promise.resolve();
      return fetch('/api/assets/' + encodeURIComponent(cid))
        .then(function (res) { return res.ok ? res.json() : []; })
        .then(function (arr) {
          (arr || []).forEach(function (a) {
            var id = a.asset_id || a.AssetID;
            var opt = document.createElement('option');
            opt.value = id;
            opt.textContent = assetLabel(a);
            assetSel.appendChild(opt);
          });
          if (selectedId) assetSel.value = selectedId;
        })
        .catch(function () {});
    }

    function loadContacts(cid, selectedName) {
      resetRequesters(!!cid);
      if (!cid) return Promise.resolve();
      return fetch('/api/contacts/' + encodeURIComponent(cid))
        .then(function (res) { return res.ok ? res.json() : []; })
        .then(function (arr) {
          var names = [];
          (arr || []).forEach(function (ct) {
            var name = ct.full_name || ct.FullName || '';
            if (!name) return;
            names.push(name);
            var opt = document.createElement('option');
            opt.value = name;
            opt.textContent = contactLabel(ct);
            // 직접입력 앞에 삽입
            reqSel.insertBefore(opt, reqSel.querySelector('option[value="custom"]'));
          });
          if (selectedName) {
            if (names.indexOf(selectedName) >= 0) {
              reqSel.value = selectedName;
            } else {
              reqSel.value = 'custom';
              reqCustom.value = selectedName;
            }
          }
          syncRequesterCustom();
        })
        .catch(function () {});
    }

    reqSel.addEventListener('change', syncRequesterCustom);

    custSel.addEventListener('change', function () {
      loadAssets(custSel.value, '');
      loadContacts(custSel.value, '');
    });

    if (custSel.value) {
      loadAssets(custSel.value, initAsset);
      loadContacts(custSel.value, initRequester);
    } else {
      resetAssets(false);
      resetRequesters(false);
    }
  })();
  </script>
</div>
{{end}}
