{{define "title"}}AS 접수 · 고객지원시스템{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto space-y-6">

  <div class="flex items-center gap-3">
    <a href="/as" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <div>
      <h2 class="text-xl font-bold text-gray-800">AS 접수</h2>
      <p class="text-sm text-gray-500">기획서 §8 기준</p>
    </div>
  </div>

  <form method="POST" action="/as" class="space-y-6">

    <!-- 기관 + 자산 -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h3 class="font-semibold text-gray-700 text-sm uppercase tracking-wider">접수 대상</h3>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">기관 <span class="text-red-500">*</span></label>
        <select name="customer_id" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">기관 선택</option>
          {{range .Customers}}
          <option value="{{.CustomerID}}" {{if eq $.AS.CustomerID .CustomerID}}selected{{end}}>{{.OrgName}}</option>
          {{end}}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">설치자산 (선택)</label>
        <input type="text" name="asset_id" value="{{.AS.AssetID}}"
               placeholder="자산 ID 또는 검색 (추후 HTMX 자동완성 연동)"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>

    <!-- 접수 정보 -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h3 class="font-semibold text-gray-700 text-sm uppercase tracking-wider">접수 정보</h3>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">접수 채널</label>
          <select name="receipt_channel"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="phone">전화</option>
            <option value="email">이메일</option>
            <option value="visit">방문</option>
            <option value="partner">협력사 요청</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">긴급도</label>
          <select name="urgency"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="high">상 (긴급)</option>
            <option value="normal" selected>중 (보통)</option>
            <option value="low">하 (여유)</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">요청자</label>
        <input type="text" name="requester" value="{{.AS.Requester}}"
               placeholder="요청자 이름"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">증상 내용 <span class="text-red-500">*</span></label>
        <textarea name="symptom" rows="4" required
                  placeholder="장애 또는 지원 요청 내용을 자세히 입력하세요."
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{.AS.Symptom}}</textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">요청주체 유형</label>
          <select name="requester_type"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="customer">고객직접</option>
            <option value="manufacturer">제조사</option>
            <option value="partner">협력사</option>
            <option value="prime">원청</option>
            <option value="internal">내부</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">배정 담당자</label>
          <input type="text" name="assigned_to" value="{{.AS.AssignedTo}}"
                 placeholder="담당자 이름"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>
    </div>

    <!-- 버튼 -->
    <div class="flex gap-3 justify-end">
      <a href="/as" class="px-5 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
        취소
      </a>
      <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
        접수 등록
      </button>
    </div>

  </form>
</div>
{{end}}
