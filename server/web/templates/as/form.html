{{define "title"}}AS 접수 · 고객지원시스템{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-3">
    <a href="/as" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a>
    <div><h2 class="text-xl font-bold text-gray-800">AS 접수</h2><p class="text-sm text-gray-500">기획서 §8 기준</p></div>
  </div>

  <form method="POST" action="/as" class="space-y-6">
    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h3 class="font-semibold text-gray-700 text-sm uppercase tracking-wider">접수 대상</h3>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">기관 <span class="text-red-500">*</span></label>
        <select name="customer_id" required class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="">기관 선택</option>
          {{range .Customers}}<option value="{{.CustomerID}}" {{if eq $.AS.CustomerID .CustomerID}}selected{{end}}>{{.OrgName}}</option>{{end}}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">설치자산 (선택)</label>
        <input type="text" name="asset_id" value="{{.AS.AssetID}}" placeholder="자산 ID" class="w-full border rounded-lg px-3 py-2 text-sm">
      </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <h3 class="font-semibold text-gray-700 text-sm uppercase tracking-wider">접수 정보</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">접수 채널</label>
          <select name="receipt_channel" class="w-full border rounded-lg px-3 py-2 text-sm">
            {{range .Channels}}<option value="{{.CodeValue}}">{{.CodeName}}</option>{{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">긴급도</label>
          <select name="urgency" class="w-full border rounded-lg px-3 py-2 text-sm">
            {{range .Urgencies}}<option value="{{.CodeValue}}" {{if eq .CodeValue "normal"}}selected{{end}}>{{.CodeName}}</option>{{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">중요도</label>
          <select name="priority" class="w-full border rounded-lg px-3 py-2 text-sm">
            <option value="high">상</option><option value="normal" selected>중</option><option value="low">하</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">요청자</label>
          <input type="text" name="requester" value="{{.AS.Requester}}" placeholder="요청자 이름" class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">증상 내용 <span class="text-red-500">*</span></label>
        <textarea name="symptom" rows="4" required placeholder="장애 또는 지원 요청 내용을 자세히 입력하세요." class="w-full border rounded-lg px-3 py-2 text-sm">{{.AS.Symptom}}</textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">요청주체 유형</label>
          <select name="requester_type" class="w-full border rounded-lg px-3 py-2 text-sm">
            {{range .ReqTypes}}<option value="{{.CodeValue}}">{{.CodeName}}</option>{{end}}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">요청주체명</label>
          <input type="text" name="requester_name" value="{{.AS.RequesterName}}" placeholder="요청 주체 회사/기관명" class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">배정 담당자</label>
          <input type="text" name="assigned_to" value="{{.AS.AssignedTo}}" placeholder="담당자 이름" class="w-full border rounded-lg px-3 py-2 text-sm">
        </div>
      </div>
    </div>

    <div class="flex gap-3 justify-end">
      <a href="/as" class="px-5 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">취소</a>
      <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">접수 등록</button>
    </div>
  </form>
</div>
{{end}}
