{{define "title"}}{{if .IsNew}}수행관계 등록{{else}}수행관계 수정{{end}} · 고객지원시스템{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-3">
    <a href="/relations" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a>
    <h2 class="text-xl font-bold text-gray-800">{{if .IsNew}}수행관계 등록{{else}}수행관계 수정{{end}}</h2>
  </div>

  <form method="POST" action="{{if .IsNew}}/relations{{else}}/relations/{{.Relation.RelationID}}/update{{end}}" class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">기관</label>
        <select name="customer_id" class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="">선택</option>
          {{range .Customers}}<option value="{{.CustomerID}}" {{if eq .CustomerID $.Relation.CustomerID}}selected{{end}}>{{.OrgName}}</option>{{end}}
        </select>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">자산ID</label><input type="text" name="asset_id" value="{{.Relation.AssetID}}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">관계구분 <span class="text-red-500">*</span></label>
        <select name="relation_type" required class="w-full border rounded-lg px-3 py-2 text-sm">
          {{range .RelTypes}}<option value="{{.CodeValue}}" {{if eq .CodeValue $.Relation.RelationType}}selected{{end}}>{{.CodeName}}</option>{{end}}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">상대회사구분</label>
        <select name="company_type" class="w-full border rounded-lg px-3 py-2 text-sm">
          {{range .CompTypes}}<option value="{{.CodeValue}}" {{if eq .CodeValue $.Relation.CompanyType}}selected{{end}}>{{.CodeName}}</option>{{end}}
        </select>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">상대회사명</label><input type="text" name="company_name" value="{{.Relation.CompanyName}}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">담당자명</label><input type="text" name="contact_name" value="{{.Relation.ContactName}}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">연락처</label><input type="text" name="contact_phone" value="{{.Relation.ContactPhone}}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">이메일</label><input type="email" name="contact_email" value="{{.Relation.ContactEmail}}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">시작일</label><input type="date" name="start_date" value="{{.Relation.StartDate}}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">종료일</label><input type="date" name="end_date" value="{{.Relation.EndDate}}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
    </div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">비고</label><textarea name="notes" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm">{{.Relation.Notes}}</textarea></div>
    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_active" value="1" {{if .Relation.IsActive}}checked{{end}} class="rounded border-gray-300 text-blue-600">
      <label class="text-sm text-gray-700">현재 유효</label>
    </div>
    <div class="flex gap-3 justify-end pt-2">
      <a href="/relations" class="px-5 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">취소</a>
      <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">{{if .IsNew}}등록{{else}}저장{{end}}</button>
    </div>
  </form>
</div>
{{end}}
