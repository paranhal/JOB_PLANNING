{{define "base"}}
<!DOCTYPE html>
<html lang="ko" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}고객지원시스템{{end}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="h-full" x-data="{ sidebarOpen: false }">

<div class="flex h-full">
  <!-- 모바일 오버레이 -->
  <div x-show="sidebarOpen" x-cloak
       @click="sidebarOpen=false"
       class="fixed inset-0 z-30 bg-gray-900/50 lg:hidden"></div>

  <!-- 사이드바 -->
  <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
         class="fixed inset-y-0 left-0 z-40 w-64 bg-gray-900 text-white
                transition-transform duration-300 lg:relative lg:translate-x-0 lg:flex lg:flex-col">

    <!-- 로고 -->
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-700">
      <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-bold leading-tight">고객지원시스템</p>
        <p class="text-xs text-gray-400">CS Management</p>
      </div>
    </div>

    <!-- 네비게이션 -->
    <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1">

      <!-- 대시보드 -->
      <a href="/"
         class="nav-item {{if eq .Active "dashboard"}}bg-blue-600 text-white{{else}}text-gray-300 hover:bg-gray-800{{end}}
                flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        대시보드
      </a>

      <!-- 기준정보 -->
      <div class="pt-3">
        <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">기준정보</p>
        <a href="/customers"
           class="{{if eq .Active "customers"}}bg-blue-600 text-white{{else}}text-gray-300 hover:bg-gray-800{{end}}
                  flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          고객 관리
        </a>
        <a href="/spaces"
           class="{{if eq .Active "spaces"}}bg-blue-600 text-white{{else}}text-gray-300 hover:bg-gray-800{{end}}
                  flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          </svg>
          공간 관리
        </a>
        <a href="/contacts"
           class="{{if eq .Active "contacts"}}bg-blue-600 text-white{{else}}text-gray-300 hover:bg-gray-800{{end}}
                  flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          담당자 관리
        </a>
      </div>

      <!-- 자산관리 -->
      <div class="pt-3">
        <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">자산관리</p>
        <a href="/assets"
           class="{{if eq .Active "assets"}}bg-blue-600 text-white{{else}}text-gray-300 hover:bg-gray-800{{end}}
                  flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2v-4M9 21H5a2 2 0 01-2-2v-4m0 0h18"/>
          </svg>
          설치자산 관리
        </a>
      </div>

      <!-- AS관리 -->
      <div class="pt-3">
        <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">AS관리</p>
        <a href="/as"
           class="{{if eq .Active "as"}}bg-blue-600 text-white{{else}}text-gray-300 hover:bg-gray-800{{end}}
                  flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
          AS 접수 / 처리
        </a>
      </div>

      <!-- 분석 -->
      <div class="pt-3">
        <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">분석 / 영업</p>
        <a href="/analysis"
           class="{{if eq .Active "analysis"}}bg-blue-600 text-white{{else}}text-gray-300 hover:bg-gray-800{{end}}
                  flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          교체대상 분석
        </a>
      </div>

      <!-- 관리 -->
      <div class="pt-3">
        <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">관리</p>
        <a href="/codes"
           class="{{if eq .Active "codes"}}bg-blue-600 text-white{{else}}text-gray-300 hover:bg-gray-800{{end}}
                  flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          코드 관리
        </a>
      </div>

    </nav>

    <!-- 버전 -->
    <div class="px-6 py-3 border-t border-gray-700">
      <p class="text-xs text-gray-500">v1.0.0 · Go + HTMX</p>
    </div>
  </aside>

  <!-- 메인 콘텐츠 -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- 상단 바 -->
    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-4">
      <!-- 모바일 햄버거 -->
      <button @click="sidebarOpen=!sidebarOpen" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <h1 class="text-lg font-semibold text-gray-800">{{block "heading" .}}{{.Title}}{{end}}</h1>
      <div class="ml-auto flex items-center gap-2">
        <!-- 로딩 인디케이터 -->
        <div class="htmx-indicator">
          <div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
      </div>
    </header>

    <!-- 페이지 콘텐츠 -->
    <main class="flex-1 overflow-y-auto p-6" id="main-content">
      {{block "content" .}}{{end}}
    </main>

  </div>
</div>

</body>
</html>
{{end}}
