{{define "title"}}{{.Title}} · 고객지원시스템{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto space-y-6">

  <!-- 헤더 -->
  <div class="flex items-center gap-3">
    <a href="/contacts" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h2 class="text-xl font-bold text-gray-800">{{.Title}}</h2>
  </div>

  <!-- 폼 -->
  <form method="POST"
        action="{{if .IsNew}}/contacts{{else}}/contacts/{{.Contact.ContactID}}/update{{end}}"
        class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">

    <!-- 소속 기관 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">소속 기관 <span class="text-red-500">*</span></label>
      <select name="customer_id" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">-- 기관 선택 --</option>
        {{range .Customers}}
        <option value="{{.CustomerID}}" {{if eq .CustomerID $.Contact.CustomerID}}selected{{end}}>{{.OrgName}}</option>
        {{end}}
      </select>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- 이름 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">담당자명 <span class="text-red-500">*</span></label>
        <input type="text" name="full_name" value="{{.Contact.FullName}}" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- 담당업무 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">담당업무</label>
        <input type="text" name="job_role" value="{{.Contact.JobRole}}"
               placeholder="전산, 도서관시스템, 네트워크 등"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- 직함 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">직함/직급</label>
        <input type="text" name="title" value="{{.Contact.Title}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- 재직상태 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">재직상태</label>
        <select name="status"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="active" {{if eq .Contact.Status "active"}}selected{{end}}>재직</option>
          <option value="transferred" {{if eq .Contact.Status "transferred"}}selected{{end}}>전보</option>
          <option value="resigned" {{if eq .Contact.Status "resigned"}}selected{{end}}>퇴직</option>
        </select>
      </div>

      <!-- 직장 전화 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">직장 전화</label>
        <input type="tel" name="phone" value="{{.Contact.Phone}}"
               placeholder="041-000-0000"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- 핸드폰 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">핸드폰</label>
        <input type="tel" name="mobile" value="{{.Contact.Mobile}}"
               placeholder="010-0000-0000"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- 이메일 -->
      <div class="sm:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
        <input type="email" name="email" value="{{.Contact.Email}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- 부임일 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">부임일</label>
        <input type="date" name="start_date" value="{{.Contact.StartDate}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- 퇴임일 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">퇴임일</label>
        <input type="date" name="end_date" value="{{.Contact.EndDate}}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>

    <!-- 주담당 여부 -->
    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_primary" value="1" id="is_primary"
             {{if .Contact.IsPrimary}}checked{{end}}
             class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
      <label for="is_primary" class="text-sm text-gray-700">주담당자로 지정</label>
    </div>

    <!-- 비고 -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">비고</label>
      <textarea name="notes" rows="3"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{.Contact.Notes}}</textarea>
    </div>

    <!-- 버튼 -->
    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors">
        {{if .IsNew}}등록{{else}}저장{{end}}
      </button>
      <a href="/contacts"
         class="px-4 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors">
        취소
      </a>
    </div>

  </form>
</div>
{{end}}
